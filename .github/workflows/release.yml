name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          version="${GITHUB_REF#refs/tags/}"
          ldflags="-s -w -X main.version=${version}"

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          mkdir -p dist

          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            bin="pdf2md"
            archive="pdf2md-${version}-${os}-${arch}"

            if [ "$os" = "windows" ]; then
              bin="pdf2md.exe"
            fi

            echo "Building ${os}/${arch}..."
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -ldflags "$ldflags" -o "dist/${bin}" ./cmd/pdf2md/

            if [ "$os" = "windows" ]; then
              (cd dist && zip "${archive}.zip" "$bin" && rm "$bin")
            else
              tar -czf "dist/${archive}.tar.gz" -C dist "$bin"
              rm "dist/${bin}"
            fi
          done

          (cd dist && sha256sum * > checksums.txt)

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
